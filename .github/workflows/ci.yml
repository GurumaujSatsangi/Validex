name: CI - Tests and Mutation Testing

on:
  push:
    branches:
      - main

jobs:
  test-and-mutation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            truelens/backend/package-lock.json

      - name: Resolve backend directory
        id: backend-dir
        shell: bash
        run: |
          if [ -f backend/package.json ]; then
            echo "dir=backend" >> "$GITHUB_OUTPUT"
          elif [ -f truelens/backend/package.json ]; then
            echo "dir=truelens/backend" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find backend/package.json"
            exit 1
          fi

      - name: Show resolved backend directory
        run: echo "Using backend directory ${{ steps.backend-dir.outputs.dir }}"

      - name: Install dependencies
        working-directory: ${{ steps.backend-dir.outputs.dir }}
        run: npm ci

      - name: Debug npm scripts
        working-directory: ${{ steps.backend-dir.outputs.dir }}
        run: npm pkg get scripts

      - name: Run Jest unit tests
        working-directory: ${{ steps.backend-dir.outputs.dir }}
        run: node --experimental-vm-modules ./node_modules/jest/bin/jest.js --ci

      - name: Run Stryker mutation tests
        working-directory: ${{ steps.backend-dir.outputs.dir }}
        run: npx stryker run

      - name: Upload Stryker HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-mutation-report
          path: |
            backend/reports/mutation
            truelens/backend/reports/mutation
          if-no-files-found: ignore
